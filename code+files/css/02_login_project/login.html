<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login page</title>
  <style>
    body {
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif ;
        background-color: #7ddaf4;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .card{
      h2{
        color: #ffe749;
        text-align: center;
        margin-bottom: 40px;
      }
      form{
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      background: #f4b7f1;
      border-radius: 8px;
      padding: 30px;
      width: 300px;
    }
    input{
      margin-bottom: 50px;
      padding: 20px;
      border-radius: 10px;
      border: 3px solid rgb(244, 158, 72);
      background-color:#ffffff;
    }
    button{
      background-color: #d71ac7;
      padding: 10px;
      font-size: larger;
      border-radius: 8px;
      
    }
    
      button :hover{
      background-color: #21af39;
    }
    
    

    
  </style>
</head>
<body>
      <div class="card">
        <h2>Login</h2>
        <form>
          <input type = "email" name="" id="" placeholder="email">
          <input type = "password" name="" id="" placeholder="password">
          <button type ="submit">Login </button>
               </form>
      </div>
</body>
</html>
