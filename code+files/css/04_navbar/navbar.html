<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navigation Bar Variations</title>

    <style>
      .nav1 a{
        padding: 5px 15px;
        position:relative;
      }
      .nav1 a::after{
        content:"";
        position:absolute;
        width:100%;
        bottom:0;
        left:0;
        background-color:rgb(8, 11, 188);
        height: 2px;
        transform: scaleX(0);
        transition: transform 0.3s ease-in-out;
      } 
      .nav1 a:hover::after{
        transform: scaleX(1);

      }
      body{
        font-family : Arial, Helvetica, sans-serif sans-serif;
        margin:0;
        padding:20px;
        background-color: #26b3cb;
        color: #000000;
      }
      .nav1 li{
        display:inline;
      }
      .nav1 a{
        text-decoration:none;
        color:rgb(188, 74, 8);
        /* background-color: #2813b4; */
        padding: 5px 15px;
        /* position:relative; */ 
      }
      .nav1 .login-btn{
        background-color:rgb(210, 16, 155);
        color:azure;
        border:none;
        padding: 5px 15px;
        border-radius: 5px;
        cursor:pointer;
      } 
      .nav2{
        background-color: rgb(219, 151, 62);
        width: 200px;
        padding: 20px;
      }
      .nav2 ul{
        list-style-type: none;
        margin:0px;
        padding:0px;

      }
      .nav2 li{
        margin-bottom:12px;
      }
      .nav2 a{
        text-decoration: none;
        color: #eee6e6;
        display: block;
        padding: 10px;
        width: 100%;
      }
      .nav2 a:hover{
        background: #59a751;
      }
      .nav2 .login-btn{
        background-color: #a96307;
        color: azure;
        text-decoration: none;
        border: none;
        width: 100%;
        padding: 10px;
        cursor: pointer;
      }
      .nav2 .login-btn:hover{
        background-color: #c8232e;
        border: 1px solid white;
      }
      .nav3 ul{
      background-color: #f7f06d;
      list-style-type: none;
      margin: 0%;
      justify-content: space-around;
      align-items: center ;
      display: flex;
      }
      .nav3 a{
        text-decoration: none;
        padding: 10px;
        color: #000000;
        display: block;
      }
      .nav3 .dropdown-content{
        display: none ;
      }
      .nav3 .dropdown:hover .dropdown-content{
      display: block;
      position: absolute;
      background-color: #efe642;
      min-width: 150px;
    

      }

          .nav-container {
        margin-bottom: 50px;
      }
      h2 {
        margin-bottom: 20px;
      }
      .nav1{
        /* border:3px solid #c70a0a; */
        background-color: #eee6e6;
        padding: 20px;
      }

      .nav1 ul{
        list-style-type:none; 
        display:flex;
        justify-content:space-around;
        width:90%;
        gap:10px;
        padding: 0px;
        margin: 0px;
      }
     
    </style>
  </head>
  <body>
    <div class="nav-container">
      <h2>Variation 1: Horizontal with underline effect</h2>
      <nav class="nav1">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Products</a></li>
          <li><button class="login-btn">Login</button></li>
        </ul>
      </nav>
    </div>

    <div class="nav-container">
      <h2>Variation 2: Vertical with hover effect</h2>
      <nav class="nav2">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Products</a></li>
        </ul>
        <button class="login-btn">Login</button>
      </nav>
    </div>

    <div class="nav-container">
      <h2>Variation 3: Horizontal with dropdown</h2>
      <nav class="nav3">
        <ul>
          <li><a href="#">Home</a></li>
          <li class="dropdown">
            <a href="#">About</a>
            <div class="dropdown-content">
              <a href="#">Our Story</a>
              <a href="#">Team</a>
              <a href="#">Contact</a>
            </div>
          </li>
          <li><a href="#">Products</a></li>
          <li><button class="login-btn">Login</button></li>
        </ul>
      </nav>
    </div>
  </body>
</html>
